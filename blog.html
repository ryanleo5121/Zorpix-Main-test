<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog | Zorpix Digital Agency</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #0a0a0a; color: #fff; }
    h1 { color: #fff; }
    .post-card { background: #1a1a1a; border-radius: 10px; padding: 20px; margin: 20px 0; }
    .post-card h2 { color: #fff; margin: 0 0 10px; }
    .post-card p { color: #aaa; }
    .post-card a { color: #6c63ff; text-decoration: none; }
    .date { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Zorpix Blog</h1>
  <div id="posts"></div>

  <script src="https://unpkg.com/marked/marked.min.js"></script>
<script>
  const GITHUB_USER = 'ryanleo5121';
  const GITHUB_REPO = 'Zorpix-Main-test';
  const POSTS_FOLDER = '_posts';

  const container = document.getElementById('posts');

  async function loadPosts() {
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${POSTS_FOLDER}`);
      const files = await res.json();

      if (!Array.isArray(files) || files.length === 0) {
        container.innerHTML = '<p style="color:#aaa">No posts yet.</p>';
        return;
      }

      // Sort by newest first
      files.reverse();

      for (const file of files) {
        const postRes = await fetch(file.download_url);
        const text = await postRes.text();

        // Extract title and date from filename (e.g. 2026-04-02-my-post.md)
        const nameParts = file.name.replace('.md', '').split('-');
        const date = `${nameParts[0]}-${nameParts[1]}-${nameParts[2]}`;
        const title = nameParts.slice(3).join(' ');

        const card = document.createElement('div');
        card.className = 'post-card';
        card.innerHTML = `
          <h2>${title || file.name}</h2>
          <p class="date">${date}</p>
          <div>${marked.parse(text)}</div>
        `;
        container.appendChild(card);
      }
    } catch (err) {
      container.innerHTML = '<p style="color:#aaa">Failed to load posts.</p>';
    }
  }

  loadPosts();
</script>
</body>
</html>
